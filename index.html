<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lafy · Spotify Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 460px;
      width: 90%;
      text-align: center;
    }
    .logo {
      width: 64px; height: 64px;
      background: #1DB954;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p  { font-size: 14px; color: #999; line-height: 1.6; margin-bottom: 24px; }
    .status {
      font-size: 15px; font-weight: 600;
      padding: 12px 20px; border-radius: 8px; margin-bottom: 20px;
    }
    .status.loading { background: #1a2a1a; color: #1DB954; }
    .status.success { background: #1a2a1a; color: #1DB954; }
    .status.error   { background: #2a1a1a; color: #e84040; }

    .code-box {
      background: #111;
      border: 2px solid #1DB954;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      display: none;
    }
    .code-label {
      font-size: 12px; color: #666; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;
    }
    .code-value {
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 12px;
      color: #1DB954;
      font-family: monospace;
    }

    .copy-btn {
      background: #1DB954;
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-bottom: 12px;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #17a34a; }
    .copy-btn.copied { background: #444; color: #1DB954; }

    .instruction {
      background: #111;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #aaa;
      text-align: left;
      line-height: 1.8;
      display: none;
    }
    .instruction strong { color: #1DB954; }

    small { display: block; margin-top: 16px; font-size: 12px; color: #444; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">♪</div>
    <h1>Lafy · Spotify</h1>
    <p>Conectando sua conta do Spotify ao servidor...</p>

    <div id="status" class="status loading">⏳ Processando...</div>

    <div id="codeBox" class="code-box">
      <div class="code-label">Seu código</div>
      <div id="codeValue" class="code-value">------</div>
    </div>

    <button id="copyBtn" class="copy-btn" style="display:none" onclick="copyCode()">📋 Copiar código</button>

    <div id="instruction" class="instruction"></div>

    <small id="hint"></small>
  </div>

  <script>
    const statusEl   = document.getElementById('status');
    const codeBoxEl  = document.getElementById('codeBox');
    const codeValEl  = document.getElementById('codeValue');
    const copyBtnEl  = document.getElementById('copyBtn');
    const instrEl    = document.getElementById('instruction');
    const hintEl     = document.getElementById('hint');

    let currentCode = '';

    function setStatus(type, msg) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }

    function copyCode() {
      if (!currentCode) return;
      navigator.clipboard.writeText(currentCode).then(() => {
        copyBtnEl.textContent = '✓ Copiado!';
        copyBtnEl.className = 'copy-btn copied';
        setTimeout(() => {
          copyBtnEl.textContent = '📋 Copiar código';
          copyBtnEl.className = 'copy-btn';
        }, 2000);
      }).catch(() => {
        // fallback manual
        const ta = document.createElement('textarea');
        ta.value = currentCode;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        copyBtnEl.textContent = '✓ Copiado!';
      });
    }

    function parseQuery(search) {
      const params = {};
      search.replace(/^\?/, '').split('&').forEach(part => {
        const [k, v] = part.split('=');
        if (k) params[decodeURIComponent(k)] = decodeURIComponent((v || '').replace(/\+/g, ' '));
      });
      return params;
    }

    // Gera código numérico curto de 6 dígitos
    function makeShortCode() {
      return Math.floor(100000 + Math.random() * 900000).toString();
    }

    (async function() {
      const params = parseQuery(window.location.search);
      const authCode = params['code'];
      const error    = params['error'];

      if (error) {
        setStatus('error', '✗ Login cancelado: ' + error);
        hintEl.textContent = 'Feche esta aba e tente /importspotify novamente no jogo.';
        return;
      }

      if (!authCode) {
        setStatus('error', '✗ Código de autorização não encontrado');
        hintEl.textContent = 'Acesse esta página pelo link gerado no jogo.';
        return;
      }

      setStatus('loading', '⏳ Autenticando com o Spotify...');

      try {
        // Envia o authCode para o servidor FiveM armazenar e retornar um código curto
        // O servidor FiveM expõe um endpoint HTTP para isso
        // Detecta automaticamente a URL do servidor
        const serverUrl = new URLSearchParams(window.location.search).get('sv') || '';

        if (!serverUrl) {
          // Sem servidor configurado: só exibe o código completo truncado
          // O usuário vai precisar copiar e colar manualmente
          // Mas mostramos de forma bem visível
          currentCode = authCode;
          setStatus('success', '✓ Login realizado!');
          codeBoxEl.style.display = 'block';
          codeValEl.style.fontSize = '11px';
          codeValEl.style.letterSpacing = '1px';
          codeValEl.style.wordBreak = 'break-all';
          codeValEl.style.lineHeight = '1.6';
          codeValEl.textContent = authCode;
          copyBtnEl.style.display = 'block';
          instrEl.style.display = 'block';
          instrEl.innerHTML = '1. Clique em <strong>Copiar código</strong><br>2. Volte ao jogo<br>3. Abra o chat e use: <strong>/importspotify [CTRL+V]</strong>';
          return;
        }

        // Com servidor: troca por código curto
        const res = await fetch(serverUrl + '/spotify_callback', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code: authCode })
        });
        const data = await res.json();

        if (data.short_code) {
          currentCode = data.short_code;
          setStatus('success', '✓ Autenticado!');
          codeBoxEl.style.display = 'block';
          codeValEl.textContent = currentCode;
          copyBtnEl.style.display = 'block';
          instrEl.style.display = 'block';
          instrEl.innerHTML = '1. Clique em <strong>Copiar código</strong><br>2. Volte ao jogo<br>3. Use no chat: <strong>/importspotify ' + currentCode + '</strong>';
        } else {
          throw new Error(data.error || 'Resposta inválida');
        }
      } catch(e) {
        // Fallback: mostra o código completo de forma copiável
        currentCode = authCode;
        setStatus('success', '✓ Login realizado! Copie o código abaixo:');
        codeBoxEl.style.display = 'block';
        codeValEl.style.fontSize = '11px';
        codeValEl.style.letterSpacing = '1px';
        codeValEl.style.wordBreak = 'break-all';
        codeValEl.style.lineHeight = '1.6';
        codeValEl.textContent = authCode;
        copyBtnEl.style.display = 'block';
        instrEl.style.display = 'block';
        instrEl.innerHTML = '1. Clique em <strong>Copiar código</strong><br>2. Volte ao jogo<br>3. Abra o chat e cole: <strong>/importspotify [CTRL+V]</strong>';
        hintEl.textContent = 'O código é copiado automaticamente ao clicar no botão.';
      }
    })();
  </script>
</body>
</html>
