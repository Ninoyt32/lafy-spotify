<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lafy · Spotify Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 48px 40px;
      max-width: 420px;
      width: 90%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      background: #1DB954;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    p  { font-size: 14px; color: #999; line-height: 1.6; margin-bottom: 24px; }
    .status {
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .status.loading { background: #1a2a1a; color: #1DB954; }
    .status.success { background: #1a2a1a; color: #1DB954; }
    .status.error   { background: #2a1a1a; color: #e84040; }
    .token-box {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      color: #888;
      text-align: left;
      max-height: 80px;
      overflow: hidden;
      display: none;
    }
    small { display: block; margin-top: 20px; font-size: 12px; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">♪</div>
    <h1>Lafy · Spotify</h1>
    <p>Conectando sua conta do Spotify ao servidor...</p>

    <div id="status" class="status loading">⏳ Processando...</div>
    <div id="tokenBox" class="token-box"></div>

    <small id="hint"></small>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const tokenBoxEl = document.getElementById('tokenBox');
    const hintEl = document.getElementById('hint');

    function setStatus(type, msg) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }

    function parseHash(hash) {
      const params = {};
      hash.replace(/^#/, '').split('&').forEach(part => {
        const [k, v] = part.split('=');
        if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
      });
      return params;
    }

    (function() {
      const hash = window.location.hash;
      if (!hash || !hash.includes('access_token')) {
        setStatus('error', '✗ Token não encontrado');
        hintEl.textContent = 'Acesse esta página pelo link gerado no jogo.';
        return;
      }

      const params = parseHash(hash);
      const token = params['access_token'];
      const expiresIn = params['expires_in'] || 3600;

      if (!token) {
        setStatus('error', '✗ Falha na autenticação');
        hintEl.textContent = 'Tente novamente dentro do jogo.';
        return;
      }

      setStatus('loading', '⏳ Enviando para o jogo...');

      // Tenta passar o token de volta via window.opener (se foi aberto pelo jogo via NUI)
      if (window.opener && !window.opener.closed) {
        try {
          window.opener.postMessage({ type: 'SPOTIFY_TOKEN', access_token: token, expires_in: expiresIn }, '*');
          setStatus('success', '✓ Conectado com sucesso!');
          hintEl.textContent = 'Pode fechar esta aba e voltar ao jogo.';
          tokenBoxEl.style.display = 'none';
          setTimeout(() => window.close(), 2000);
          return;
        } catch(e) {}
      }

      // Fallback: exibe o token para o jogador copiar manualmente no chat do jogo
      setStatus('success', '✓ Login realizado!');
      tokenBoxEl.style.display = 'block';
      tokenBoxEl.textContent = token;
      hintEl.textContent = 'Copie o código acima e cole no chat do jogo com: /spotify ' + token.substring(0, 20) + '...';

      // Salva no localStorage como fallback
      try { localStorage.setItem('lafy_spotify_token', token); } catch(e) {}
    })();
  </script>
</body>
</html>
